.build-service:
  stage: build
  image: docker:23.0.1
  services:
    - docker:23.0.1-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: 1
    SERVICE_IMAGE_LATEST: $CI_REGISTRY_IMAGE/$SERVICE_NAME:latest
    SERVICE_IMAGE_TAG: $CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_TAG
    SERVICE_PATH: $SERVICE_NAME
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
      --cache-from $SERVICE_IMAGE_LATEST
      --tag $SERVICE_IMAGE_LATEST
      --tag $SERVICE_IMAGE_TAG
      --file $SERVICE_PATH/Dockerfile.prod
      ./

    - docker push $SERVICE_IMAGE_TAG
    - docker push $SERVICE_IMAGE_LATEST
  only:
    refs:
      - tags
